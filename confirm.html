<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Confirm your vote — Snow's Family</title>

<!-- ADSTERRA — Popunder aquí -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Karla:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="bar">
  <img class="logo" src="https://i.ibb.co/rKQcfY1s/logo.png" alt="Snow's Family">
</header>

<div class="prog"><i class="done"></i><i class="done"></i><i class="now"></i><i></i><i></i></div>
<p class="step">Step 3 of 5 · Confirm</p>

<section style="padding-top:10px">
  <div class="wrap">
    <div class="confirm">
      <span class="eyebrow">Last check</span>
      <p style="color:var(--ink-soft);margin-top:14px">You're naming Snow's brother</p>
      <p class="big" id="pick">—</p>
      <p style="color:var(--ink-soft);font-size:.92rem">This is final. One vote per person.</p>
      <button class="btn" id="lock" style="margin-top:22px">Yes — lock it in ✓</button>
      <a class="btn lime" href="vote.html" style="margin-top:10px;background:transparent;color:var(--ink-soft);box-shadow:none;border:1.5px solid var(--line);font-weight:600">Change my pick</a>
    </div>
  </div>
</section>

<footer><p><b>Snow's Family</b></p></footer>

<script>
/* ===== CONFIG ===== */
const ENDPOINT = "";   // tu URL de Vercel

const pick = localStorage.getItem("snow_vote");
if (!pick) location.href = "vote.html";
document.getElementById("pick").textContent = pick;

document.getElementById("lock").addEventListener("click", async e => {
  e.target.disabled = true;
  e.target.textContent = "Saving…";
  if (ENDPOINT) {
    try {
      await fetch(ENDPOINT, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ type:"vote", name:pick })
      });
    } catch(err){}
  }
  location.href = "result.html";
});
</script>

<!-- ADSTERRA — Social Bar aquí -->
</body>
</html>
