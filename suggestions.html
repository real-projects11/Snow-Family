<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>What everyone else suggested — Snow's Family</title>

<!-- ADSTERRA — Popunder aquí -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Karla:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="bar">
  <img class="logo" src="logo.png" alt="Snow's Family">
</header>

<div class="prog"><i class="done"></i><i class="done"></i><i class="done"></i><i class="now"></i><i></i></div>
<p class="step">Step 4 of 5 · Write-ins</p>

<section style="padding-top:14px">
  <div class="wrap">
    <span class="eyebrow">✍️ Write-in names</span>
    <h2 style="margin:14px 0 6px">People suggested their own.</h2>
    <p class="lede">Not on the ballot — but we read every one.</p>

    <div class="sugs" id="sugs">
      <p class="note" id="sugNote">Loading suggestions…</p>
    </div>

    <div class="card" style="margin-top:22px">
      <p class="eyebrow">Got a better one?</p>
      <h2 style="font-size:1.4rem;margin:12px 0 12px">Suggest a name</h2>
      <input class="field" id="nameIn" maxlength="18" placeholder="Type a name…">
      <button class="btn lime" id="send">Send it in</button>
      <p class="note" id="sendNote">Write-ins can make the next ballot.</p>
    </div>

    <a class="btn" href="round2.html" style="margin-top:22px">One more vote → 🦍</a>
  </div>
</section>

<footer><p><b>Snow's Family</b></p></footer>

<script>
/* ===== CONFIG ===== */
const ENDPOINT = "";   // tu URL de Vercel

const sugs = document.getElementById("sugs");
const sugNote = document.getElementById("sugNote");

/* Solo mostramos sugerencias reales. Nada inventado. */
(async () => {
  if (!ENDPOINT) { sugNote.textContent = "Suggestions appear here as people send them in."; return; }
  try {
    const list = await (await fetch(ENDPOINT + "?type=suggestions")).json(); // [{name:"Coco",count:214},…]
    if (!list.length) { sugNote.textContent = "Nobody's suggested one yet. Be the first."; return; }
    sugs.innerHTML = list.slice(0,10).map(s =>
      `<div class="sug"><span class="heart">🦍</span><span class="n">${s.name}</span><span class="c">${s.count}</span></div>`
    ).join("");
  } catch(e){ sugNote.textContent = "Suggestions appear here as people send them in."; }
})();

const send = document.getElementById("send"), sendNote = document.getElementById("sendNote");
send.addEventListener("click", async () => {
  const name = document.getElementById("nameIn").value.trim();
  if (name.length < 2) {
    sendNote.textContent = "Type a name first.";
    sendNote.style.color = "var(--coral)"; return;
  }
  send.disabled = true; send.textContent = "Sending…";
  if (ENDPOINT) {
    try {
      await fetch(ENDPOINT, {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ type:"suggestion", name })
      });
    } catch(e){}
  }
  send.textContent = "Sent ✓";
  sendNote.textContent = `"${name}" is in the pile.`;
  sendNote.style.color = "var(--leaf)";
});
</script>

<!-- ADSTERRA — Social Bar aquí -->
</body>
</html>
