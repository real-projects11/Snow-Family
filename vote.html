<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pick his name — Snow's Family</title>

<!-- ADSTERRA — Popunder script aquí -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Karla:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="bar">
  <div class="mark"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-7-9.5A4 4 0 0 1 12 8a4 4 0 0 1 7 3.5C19 16.5 12 21 12 21z"/></svg></div>
  <div class="brand"><b>Snow's Family</b><span>Love · Follow · Collect</span></div>
</header>

<section style="padding-top:8px">
  <div class="wrap">
    <span class="eyebrow">🗳️ One vote each</span>
    <h2 style="margin:14px 0 6px">Which name does he carry?</h2>
    <p class="lede">Tap the one that fits him.</p>

    <div class="placards" id="placards">
      <button class="placard" aria-pressed="false" data-name="Shadow">
        <span class="hole"></span>
        <span>
          <span class="name">Shadow</span>
          <span class="why">Where Snow goes, he follows. Always one step behind.</span>
        </span>
      </button>

      <button class="placard" aria-pressed="false" data-name="Bruno">
        <span class="hole"></span>
        <span>
          <span class="name">Bruno</span>
          <span class="why">Solid, warm, a little stubborn. The one who shares his food.</span>
        </span>
      </button>

      <button class="placard" aria-pressed="false" data-name="Kobi">
        <span class="hole"></span>
        <span>
          <span class="name">Kobi</span>
          <span class="why">Small name for a small brother who never stops moving.</span>
        </span>
      </button>
    </div>

    <div class="disclose">
      <b>Heads up:</b> Snow and his family are characters created with AI. The name you pick is real — it goes in every video from here on.
    </div>
  </div>
</section>

<footer><p><b>Snow's Family</b></p></footer>

<div class="sticky on" id="sticky">
  <div class="in">
    <div class="who"><b id="who">Pick a name</b><span id="sub">Tap one above to continue</span></div>
    <button class="btn" id="submit" disabled>Lock it in</button>
  </div>
</div>

<script>
/* ===== CONFIG =====
   Tu endpoint de Vercel. Recibe { type:"vote", name }.
   Nunca pongas el token del bot de Telegram acá — este archivo es público. */
const ENDPOINT = "";

const cards  = document.querySelectorAll(".placard");
const submit = document.getElementById("submit");
const who    = document.getElementById("who");
const sub    = document.getElementById("sub");
let picked = null;

cards.forEach(card => card.addEventListener("click", () => {
  cards.forEach(c => c.setAttribute("aria-pressed","false"));
  card.setAttribute("aria-pressed","true");
  picked = card.dataset.name;
  submit.disabled = false;
  who.textContent = picked;
  sub.textContent = "Ready to lock in";
  if (navigator.vibrate) navigator.vibrate(12);
}));

submit.addEventListener("click", async () => {
  if (!picked) return;
  submit.disabled = true;
  submit.textContent = "Saving…";
  localStorage.setItem("snow_vote", picked);

  if (ENDPOINT) {
    try {
      await fetch(ENDPOINT, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ type:"vote", name:picked })
      });
    } catch(e) { /* el voto igual queda guardado — no bloqueamos al usuario */ }
  }
  location.href = "result.html";
});
</script>

<!-- ADSTERRA — Social Bar aquí -->
</body>
</html>
